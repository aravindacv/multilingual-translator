# =============================================================================
# tulu.properties — Tulu Language Word Database
# Built by CVA — Multilingual Translator
# =============================================================================
#
# FORMAT:  english_word = native_tulu | transliteration
#
# RULES:
#   - One word/phrase per line
#   - Lines starting with # are comments
#   - Use underscore for multi-word keys: good_morning
#   - Pipe | separates Kannada script from Roman transliteration
#   - Section headers in [brackets] are just for readability, ignored by parser
#   - UTF-8 encoding — Tulu written in Kannada Unicode script
#
# TO ADD NEW WORDS: just add a new line in the correct section
#   example:   elephant = ಆನೆ | Ane
# =============================================================================

# SKIP WORDS — connecting words that are not translated (ignored in output)
# These are stored separately in tulu_engine.js
# a, an, the, of, in, at, to, and, but, or, with, for, this, that, it, its

